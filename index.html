<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卒業記念アーカイブ | ありがとう武井</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* クイズ用の追加スタイル */
        .quiz-area {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }
        .quiz-area input {
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-right: 10px;
            width: 200px;
        }
        .forgot-link {
            display: block;
            margin-top: 15px;
            color: #fff;
            text-decoration: underline;
            font-size: 0.9em;
            cursor: pointer;
            opacity: 0.8;
        }
        #access-code-display {
            margin-top: 15px;
            font-weight: bold;
            color: #00ffcc; /* 目立つ色 */
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="container">
            <p class="brand">Arigato Taketi Fan Club</p>
            <h1>ありがとう武井 <br><span class="highlight"> </span></h1>
            
            <div class="cta-group">
                <a href="./arigato-takei.pdf" target="_blank" class="btn btn-main">
                    PDF版「ありがとう武井」を閲覧
                </a>
                <a href="https://takei-net.onrender.com" class="btn btn-sub">
                    takei.net 公式サイト
                </a>
                
                <span class="forgot-link" onclick="toggleQuiz()">アクセスコードを忘れた方はこちら（クイズ）</span>
                
                <div id="quiz-section" class="quiz-area">
                    <p>武井先生の本名を漢字で答えよ</p>
                    <input type="text" id="quiz-answer" placeholder="漢字で入力">
                    <button class="btn btn-sub" style="padding: 10px 20px;" onclick="checkAnswer()">回答</button>
                    <div id="access-code-display"></div>
                </div>
            </div>
        </div>
    </div>

    <section class="message-section">
        <div class="container">
            <h2>Guest Message</h2>
            <p>メッセージを募集中です</p>
            <div class="cta-group">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLScfi4jiO7deaC6QXdaqIjjdeoyc4s-WwdApZjo6-MRfe0vL_Q/viewform?usp=publish-editor" target="_blank" class="btn btn-sub">
                    メッセージを投稿する
                </a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Arigato Taketi Fan Club. All Rights Reserved.</p>
    </footer>

    <script>
        function toggleQuiz() {
            const section = document.getElementById('quiz-section');
            section.style.display = section.style.display === 'block' ? 'none' : 'block';
        }

        function checkAnswer() {
            const answer = document.getElementById('quiz-answer').value;
            const display = document.getElementById('access-code-display');
            
            if (answer === "武井健二") {
                // ここに本物のアクセスコードを入れてください
                display.innerHTML = "正解です！アクセスコードは【aisiteruyotakei】です。";
                display.style.color = "#00ffcc";
            } else {
                display.innerHTML = "答えが違います。";
                display.style.color = "#ff6666";
            }
        }
    </script>

</body>
</html>
