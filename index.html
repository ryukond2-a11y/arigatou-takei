<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卒業記念アーカイブ | ありがとう武井</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    <style>
    /* クイズ用のデザイン調整（薄水色ベース） */
    .quiz-area {
        display: none;
        margin-top: 20px;
        padding: 20px;
        background: rgba(224, 247, 250, 0.1); /* ほんのり水色の背景 */
        border: 2px solid #b2ebf2; /* 薄水色の枠線 */
        border-radius: 12px;
        backdrop-filter: blur(5px);
    }
    .quiz-area p {
        color: #b2ebf2; /* テキストも薄水色に */
        font-weight: bold;
        margin-bottom: 10px;
    }
    .quiz-area input {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #b2ebf2;
        background: #fff;
        color: #000;
        width: 100%;
        max-width: 250px;
        box-sizing: border-box;
        margin-bottom: 10px;
    }
    /* 「忘れた方はこちら」のリンクを目立たせる */
    .forgot-link {
        display: inline-block;
        margin-top: 15px;
        color: #b2ebf2; /* 薄水色 */
        text-decoration: none;
        font-size: 0.95em;
        font-weight: bold;
        cursor: pointer;
        border-bottom: 1px dashed #b2ebf2; /* 点線の下線 */
        transition: 0.3s;
    }
    .forgot-link:hover {
        color: #e0f7fa;
        border-bottom-style: solid;
    }
    #access-code-display {
        margin-top: 15px;
        font-size: 1.1em;
        font-weight: bold;
        padding: 10px;
        border-radius: 8px;
    }
</style>
</head>
<body>

    <div class="hero">
        <div class="container">
            <p class="brand">Arigato Taketi Fan Club</p>
            <h1>ありがとう武井 <br><span class="highlight"> </span></h1>
            
            <div class="cta-group">
                <a href="./arigato-takei.pdf" target="_blank" class="btn btn-main">
                    PDF版「ありがとう武井」を閲覧
                </a>
                <a href="https://takei-net.onrender.com" class="btn btn-sub">
                    takei.net 公式サイト
                </a>
                
                <span class="forgot-link" onclick="toggleQuiz()">アクセスコードを忘れた方はこちら</span>
                
                <div id="quiz-section" class="quiz-area">
                    <p>武井先生の本名を漢字で答えよ</p>
                    <input type="text" id="quiz-answer" placeholder="漢字で入力">
                    <button class="btn btn-sub" style="padding: 10px 20px;" onclick="checkAnswer()">回答</button>
                    <div id="access-code-display"></div>
                </div>
            </div>
        </div>
    </div>

    <section class="message-section">
        <div class="container">
            <h2>Guest Message</h2>
            <p>武井先生の目撃情報など募集中です</p>
            <div class="cta-group">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLScfi4jiO7deaC6QXdaqIjjdeoyc4s-WwdApZjo6-MRfe0vL_Q/viewform?usp=publish-editor" target="_blank" class="btn btn-sub">
                    メッセージを投稿する
                </a>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Arigato Taketi Fan Club. All Rights Reserved.</p>
    </footer>

    <script>
        function toggleQuiz() {
            const section = document.getElementById('quiz-section');
            section.style.display = section.style.display === 'block' ? 'none' : 'block';
        }

        function checkAnswer() {
            const answer = document.getElementById('quiz-answer').value;
            const display = document.getElementById('access-code-display');
            
            if (answer === "武井健二") {
                // ここに本物のアクセスコードを入れてください
                display.innerHTML = "正解です！アクセスコードは【aisiteruyotakei】です。";
                display.style.color = "#00ffcc";
            } else {
                display.innerHTML = "答えが違います。";
                display.style.color = "#ff6666";
            }
        }
    </script>

</body>
</html>
